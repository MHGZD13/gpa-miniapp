<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Hub</title>

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<link href="https://cdn.jsdelivr.net/npm/vazirmatn@33.003/Vazirmatn-font-face.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Vazirmatn;
}

body{

background:linear-gradient(
135deg,
#020617,
#0f172a,
#1e1b4b
);

padding:15px;
color:white;
min-height:100vh;
}

.profile{

padding:20px;
border-radius:25px;

background:
rgba(255,255,255,.08);

backdrop-filter:blur(15px);

margin-bottom:15px;
}

.weather{

padding:20px;
border-radius:25px;

background:
linear-gradient(
135deg,
#2563eb,
#1d4ed8
);

margin-bottom:15px;
}

.grid{

display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.card{

height:130px;

border-radius:25px;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

font-size:18px;

cursor:pointer;

transition:.3s;
}

.card:hover{
transform:scale(1.04);
}

.purple{
background:linear-gradient(135deg,#581c87,#312e81);
}

.blue{
background:linear-gradient(135deg,#1d4ed8,#172554);
}

.green{
background:linear-gradient(135deg,#065f46,#022c22);
}

.orange{
background:linear-gradient(135deg,#c2410c,#431407);
}

.pink{
background:linear-gradient(135deg,#c026d3,#7e22ce);
}

.games{

margin-top:15px;

padding:20px;

border-radius:25px;

background:
linear-gradient(
135deg,
#9333ea,
#c026d3
);

text-align:center;
}

button{

border:none;

padding:12px;

width:100%;

border-radius:15px;

font-size:16px;

margin-top:8px;

cursor:pointer;
}

</style>

</head>

<body>

<div class="profile">

<h2 id="name">دانشجو</h2>

<p id="date"></p>

</div>

<div class="weather">

<h2>🌤 آب و هوا</h2>

<p>بندپی شرقی</p>

<h1>27°C</h1>

</div>

<div class="grid">

<div class="card purple" onclick="gpa()">
🎓
معدل
</div>

<div class="card blue" onclick="convertGPA()">
📊
GPA
</div>

<div class="card green">
📅
برنامه
</div>

<div class="card orange">
📚
جزوه
</div>

<div class="card pink">
⏰
یادآور
</div>

<div class="card blue">
🧮
ابزارها
</div>

</div>

<div class="games">

<h2>🎮 سرگرمی</h2>

<button onclick="coin()">شیر یا خط</button>

<button onclick="dice()">تاس</button>

<button onclick="guess()">حدس عدد</button>

</div>

<script>

const tg = window.Telegram.WebApp;

tg.expand();

if(tg.initDataUnsafe.user){

document.getElementById("name").innerText =
tg.initDataUnsafe.user.first_name;

}

document.getElementById("date").innerText =
new Date().toLocaleDateString('fa-IR');

function gpa(){

alert("بخش معدل");

}

function convertGPA(){

let avg = prompt("معدل را وارد کنید");

if(!avg) return;

let gpa = (avg / 5).toFixed(2);

alert("GPA : " + gpa);

}

function coin(){

let result =
Math.random() > 0.5 ? "شیر" : "خط";

alert(result);

}

function dice(){

alert(
Math.floor(Math.random()*6)+1
);

}

function guess(){

let num =
Math.floor(Math.random()*10)+1;

let user =
prompt("عدد بین 1 تا 10");

if(Number(user)===num)
alert("بردی 🎉");
else
alert("باختی 😄 عدد "+num);

}

</script>

</body>
</html>
