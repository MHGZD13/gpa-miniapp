<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Readex+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Readex Pro',sans-serif}
body{
background:
radial-gradient(circle at top left,#7c3aed 0%,transparent 35%),
radial-gradient(circle at top right,#2563eb 0%,transparent 35%),
linear-gradient(180deg,#09090b,#111827);
min-height:100vh;color:#fff;padding:16px}
.glass{background:rgba(255,255,255,.06);backdrop-filter:blur(24px);border:1px solid rgba(255,255,255,.08);border-radius:28px;box-shadow:0 8px 32px rgba(0,0,0,.35)}
.hero{padding:24px;margin-bottom:16px}
.hero h1{font-size:32px}
.hero p{opacity:.8}
.weather{padding:24px;margin-bottom:16px}
.weather .temp{font-size:48px;font-weight:700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.card{height:160px;border-radius:28px;display:flex;flex-direction:column;justify-content:center;align-items:center}
.card i{font-size:42px;margin-bottom:12px}
.gpa{background:linear-gradient(135deg,#8b5cf6,#6d28d9)}
.schedule{background:linear-gradient(135deg,#3b82f6,#1d4ed8)}
.tools{background:linear-gradient(135deg,#06b6d4,#0891b2)}
.notes{background:linear-gradient(135deg,#f97316,#ea580c)}
.bottom-nav{position:fixed;left:15px;right:15px;bottom:15px;height:70px;background:rgba(255,255,255,.08);backdrop-filter:blur(25px);border-radius:25px;display:flex;justify-content:space-around;align-items:center}
</style>
</head>
<body>
<div class="hero glass">
<h1>Student Hub</h1>
<p>همراه هوشمند دانشجو</p>
</div>
<div class="weather glass">
<h2>آب و هوا</h2>
<div class="temp">27°C</div>
</div>
<div class="grid">
<div class="card gpa"><i class="fa-solid fa-graduation-cap"></i><span>معدل</span></div>
<div class="card schedule"><i class="fa-solid fa-calendar-days"></i><span>برنامه</span></div>
<div class="card tools"><i class="fa-solid fa-calculator"></i><span>ابزارها</span></div>
<div class="card notes"><i class="fa-solid fa-book"></i><span>جزوه‌ها</span></div>
</div>
<div class="bottom-nav">
<i class="fa-solid fa-house"></i>
<i class="fa-solid fa-gamepad"></i>
<i class="fa-solid fa-bell"></i>
<i class="fa-solid fa-user"></i>
</div>
</body>
</html>
